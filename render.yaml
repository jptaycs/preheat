databases:
  - name: preheat-db
    plan: free
    databaseName: preheat
    user: preheat

services:
  - type: web
    name: preheat-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: preheat-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      - key: HOST
        value: 0.0.0.0
      - key: NODE_ENV
        value: production
      - key: EXPO_PUSH_TOKEN_URL
        value: https://exp.host/--/api/v2/push/send
      - key: AIRPORT_ICAO
        value: KPAO
